<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&amp;display=swap');
    </style>
    <!-- Subtle radial glow behind the text -->
    <radialGradient id="glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0a0a0a"/>

  <!-- Subtle glow -->
  <rect width="1500" height="500" fill="url(#glow)"/>

  <!-- Subtle grid lines for military/tactical feel -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1125" y1="0" x2="1125" y2="500"/>
  </g>

  <!-- Crosshair element (subtle) -->
  <g transform="translate(750, 250)" stroke="#ef4444" stroke-opacity="0.12" stroke-width="1" fill="none">
    <circle r="120"/>
    <circle r="80"/>
    <circle r="40"/>
    <line x1="-140" y1="0" x2="-20" y2="0"/>
    <line x1="20" y1="0" x2="140" y2="0"/>
    <line x1="0" y1="-140" x2="0" y2="-20"/>
    <line x1="0" y1="20" x2="0" y2="140"/>
  </g>

  <!-- STRIKE text -->
  <text x="598" y="268" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="96" letter-spacing="8" fill="#ef4444">STRIKE</text>

  <!-- MAP text -->
  <text x="1003" y="268" font-family="'JetBrains Mono', monospace" font-weight="700" font-size="96" letter-spacing="8" fill="#ffffff">MAP</text>

  <!-- Bottom border accent -->
  <rect x="0" y="496" width="1500" height="4" fill="#ef4444" opacity="0.6"/>
</svg>
