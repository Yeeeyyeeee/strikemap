<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 1500px;
        height: 500px;
        background: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      /* Subtle radial glow */
      .glow {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 900px;
        height: 400px;
        background: radial-gradient(ellipse, rgba(239, 68, 68, 0.07) 0%, transparent 70%);
        pointer-events: none;
      }

      /* Crosshair */
      .crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 300px;
        pointer-events: none;
        opacity: 0.35;
      }

      .crosshair::before,
      .crosshair::after {
        content: "";
        position: absolute;
        background: #ef4444;
      }

      .crosshair::before {
        top: 50%;
        left: 0;
        right: 0;
        height: 1.5px;
        transform: translateY(-0.75px);
      }

      .crosshair::after {
        left: 50%;
        top: 0;
        bottom: 0;
        width: 1.5px;
        transform: translateX(-0.75px);
      }

      .ring {
        position: absolute;
        border: 1.5px solid #ef4444;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.3;
        pointer-events: none;
      }

      .ring-1 {
        width: 100px;
        height: 100px;
      }
      .ring-2 {
        width: 180px;
        height: 180px;
      }
      .ring-3 {
        width: 280px;
        height: 280px;
      }

      /* Logo */
      .logo {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 96px;
        letter-spacing: 8px;
        position: relative;
        z-index: 10;
      }

      .strike {
        color: #ef4444;
      }
      .map {
        color: #ffffff;
      }

      /* Bottom accent */
      .accent {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          #ef4444 30%,
          #ef4444 70%,
          transparent 100%
        );
        opacity: 0.5;
      }

      /* Subtle grid */
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 125px 125px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="crosshair"></div>
    <div class="logo"><span class="strike">STRIKE</span><span class="map">MAP</span></div>
    <div class="accent"></div>
  </body>
</html>
