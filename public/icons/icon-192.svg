<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="29" fill="#0a0a0a"/>
  <!-- Glow -->
  <defs>
    <radialGradient id="g" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="192" height="192" rx="29" fill="url(#g)"/>
  <!-- Outer ring -->
  <circle cx="96" cy="82" r="62" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.35"/>
  <!-- Tick marks (cardinal) -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.5">
    <line x1="96" y1="20" x2="96" y2="30"/>
    <line x1="96" y1="134" x2="96" y2="144"/>
    <line x1="34" y1="82" x2="44" y2="82"/>
    <line x1="148" y1="82" x2="158" y2="82"/>
  </g>
  <!-- Middle ring -->
  <circle cx="96" cy="82" r="40" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.25"/>
  <!-- Inner ring -->
  <circle cx="96" cy="82" r="20" fill="none" stroke="#ef4444" stroke-width="1.2" opacity="0.35"/>
  <!-- Crosshair lines -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.5">
    <line x1="96" y1="30" x2="96" y2="58"/>
    <line x1="96" y1="106" x2="96" y2="134"/>
    <line x1="44" y1="82" x2="72" y2="82"/>
    <line x1="120" y1="82" x2="148" y2="82"/>
  </g>
  <!-- Inner crosshair -->
  <g stroke="#ef4444" stroke-width="1.5" opacity="0.7">
    <line x1="96" y1="74" x2="96" y2="78"/>
    <line x1="96" y1="86" x2="96" y2="90"/>
    <line x1="88" y1="82" x2="92" y2="82"/>
    <line x1="100" y1="82" x2="104" y2="82"/>
  </g>
  <!-- Center dot -->
  <circle cx="96" cy="82" r="2" fill="#ef4444" opacity="0.8"/>
  <!-- STRIKEMAP text -->
  <text x="96" y="170" text-anchor="middle" font-family="monospace" font-weight="700" font-size="18" letter-spacing="2">
    <tspan fill="#ef4444">STRIKE</tspan><tspan fill="#ffffff">MAP</tspan>
  </text>
</svg>