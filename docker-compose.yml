services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_SHEET_URL: ${NEXT_PUBLIC_SHEET_URL}
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 3584M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/incidents').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
